name: 'Test Action'

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      python-version:
        description: 'Python version to test'
        required: false
        default: '3.13'
      mongodb-version:
        description: 'MongoDB version to test'
        required: false
        default: '7.0'
      redis-version:
        description: 'Redis version to test'
        required: false
        default: '7.2'

jobs:
  test-action:
    name: 'Test Spoo.me Setup Action'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']
        mongodb-version: ['7.0', '8.0']
        redis-version: ['7.0', '7.2']
      max-parallel: 2  # Limit parallel jobs to avoid resource issues

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4

      - name: 'Test Spoo.me Action (Setup spoo.me locally)'
        uses: ./
        id: spoo-setup
        with:
          python-version: ${{ matrix.python-version }}
          mongodb-version: ${{ matrix.mongodb-version }}
          redis-version: ${{ matrix.redis-version }}
          spoo-directory: 'test-spoo-service'
          wait-timeout: '180'

      - name: 'Verify Action Outputs'
        run: |
          echo "🔍 Verifying action outputs..."

          # Check outputs are set
          if [ -z "${{ steps.spoo-setup.outputs.service-url }}" ]; then
            echo "❌ service-url output not set"
            exit 1
          fi

          if [ -z "${{ steps.spoo-setup.outputs.mongodb-uri }}" ]; then
            echo "❌ mongodb-uri output not set"
            exit 1
          fi

          if [ -z "${{ steps.spoo-setup.outputs.redis-uri }}" ]; then
            echo "❌ redis-uri output not set"
            exit 1
          fi

          if [ -z "${{ steps.spoo-setup.outputs.health-url }}" ]; then
            echo "❌ health-url output not set"
            exit 1
          fi

          echo "✅ All outputs are properly set"
          echo "  - Service URL: ${{ steps.spoo-setup.outputs.service-url }}"
          echo "  - MongoDB URI: ${{ steps.spoo-setup.outputs.mongodb-uri }}"
          echo "  - Redis URI: ${{ steps.spoo-setup.outputs.redis-uri }}"
          echo "  - Health URL: ${{ steps.spoo-setup.outputs.health-url }}"

      - name: 'Test Health Endpoint'
        run: |
          echo "🏥 Testing health endpoint..."

          HEALTH_URL="${{ steps.spoo-setup.outputs.health-url }}"

          health_response=$(curl -s "$HEALTH_URL")
          echo "📋 Health response: $health_response"

          health_status=$(echo "$health_response" | python3 -c "import sys, json; print(json.load(sys.stdin)['status'])" 2>/dev/null)

          if [ -z "$health_status" ]; then
            echo "❌ Failed to parse health response"
            echo "📋 Raw response: $health_response"
            exit 1
          elif [ "$health_status" = "healthy" ]; then
            echo "✅ Service is healthy"
          elif [ "$health_status" = "degraded" ]; then
            echo "⚠️ Service is degraded (Redis may not be connected)"
          else
            echo "❌ Service is unhealthy: $health_status"
            exit 1
          fi

      - name: 'Test Main Page'
        run: |
          echo "📱 Testing main page..."

          SERVICE_URL="${{ steps.spoo-setup.outputs.service-url }}"

          response_code=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL")
          echo "🔍 Main page response code: $response_code"

          if [ "$response_code" = "200" ]; then
            echo "✅ Main page accessible"
          else
            echo "❌ Main page returned HTTP $response_code"
            exit 1
          fi

      - name: 'Test Legacy URL Shortening (POST /)'
        run: |
          echo "🔗 Testing legacy URL shortening..."

          SERVICE_URL="${{ steps.spoo-setup.outputs.service-url }}"

          # Create a short URL via legacy endpoint (form data + Accept: application/json)
          echo "📤 Creating short URL for https://example.com..."
          api_response=$(curl -s \
            --request POST \
            --url "$SERVICE_URL/" \
            --header 'Accept: application/json' \
            --header 'Content-Type: application/x-www-form-urlencoded' \
            --data 'url=https://example.com' \
            --max-time 10)

          echo "📥 Legacy API Response:"
          echo "$api_response"

          # Validate response fields
          short_url=$(echo "$api_response" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d['short_url'])" 2>/dev/null)
          original_url=$(echo "$api_response" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d['original_url'])" 2>/dev/null)

          if [ -z "$short_url" ] || [ -z "$original_url" ]; then
            echo "❌ Legacy API response missing expected fields (short_url, original_url)"
            exit 1
          fi
          echo "✅ Legacy shorten returned: $short_url"

          # Extract short code for later stats test
          legacy_short_code=$(echo "$short_url" | python3 -c "import sys; print(sys.stdin.read().strip().split('/')[-1])")
          echo "LEGACY_SHORT_CODE=$legacy_short_code" >> $GITHUB_ENV

          # Test redirect
          echo "🔄 Testing redirect for $short_url..."
          redirect_code=$(curl -s \
            --max-time 10 \
            --header 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' \
            --header 'X-Forwarded-For: 110.33.122.75' \
            --write-out "%{http_code}" \
            --output /dev/null \
            "$short_url")

          echo "🔍 Redirect response code: $redirect_code"
          if [ "$redirect_code" = "301" ] || [ "$redirect_code" = "302" ] || [ "$redirect_code" = "307" ]; then
            echo "✅ Legacy redirect working (HTTP $redirect_code)"
          else
            echo "❌ Unexpected redirect response: $redirect_code"
            curl -s -I "$short_url" | head -n 5
            exit 1
          fi

      - name: 'Test Legacy Stats (POST /stats/<code>)'
        run: |
          echo "📊 Testing legacy stats endpoint..."

          SERVICE_URL="${{ steps.spoo-setup.outputs.service-url }}"

          # Query stats for the URL we just created
          echo "📤 Fetching stats for short code: $LEGACY_SHORT_CODE"
          stats_response=$(curl -s \
            --request POST \
            --url "$SERVICE_URL/stats/$LEGACY_SHORT_CODE" \
            --max-time 10)

          echo "📥 Legacy Stats Response:"
          echo "$stats_response" | python3 -m json.tool 2>/dev/null || echo "$stats_response"

          # Validate it returned URL data (should have 'url' and 'total-clicks' fields)
          total_clicks=$(echo "$stats_response" | python3 -c "import sys, json; print(json.load(sys.stdin).get('total-clicks', 'MISSING'))" 2>/dev/null)

          if [ "$total_clicks" = "MISSING" ]; then
            echo "❌ Legacy stats response missing 'total-clicks' field"
            exit 1
          fi
          echo "✅ Legacy stats working (total-clicks: $total_clicks)"

      - name: 'Test V1 API Shorten (POST /api/v1/shorten)'
        run: |
          echo "🔗 Testing V1 API URL shortening..."

          SERVICE_URL="${{ steps.spoo-setup.outputs.service-url }}"

          # Create a short URL via V1 API (JSON body)
          echo "📤 Creating short URL via /api/v1/shorten..."
          api_response=$(curl -s \
            --request POST \
            --url "$SERVICE_URL/api/v1/shorten" \
            --header 'Content-Type: application/json' \
            --data '{"url": "https://github.com/spoo-me"}' \
            --max-time 10)

          echo "📥 V1 API Response:"
          echo "$api_response" | python3 -m json.tool 2>/dev/null || echo "$api_response"

          # Check HTTP status (should be 201)
          status_code=$(curl -s -o /dev/null -w "%{http_code}" \
            --request POST \
            --url "$SERVICE_URL/api/v1/shorten" \
            --header 'Content-Type: application/json' \
            --data '{"url": "https://github.com/spoo-me/url-shortener"}' \
            --max-time 10)

          if [ "$status_code" != "201" ]; then
            echo "❌ V1 API returned HTTP $status_code (expected 201)"
            exit 1
          fi

          # Validate response fields
          v1_alias=$(echo "$api_response" | python3 -c "import sys, json; print(json.load(sys.stdin)['alias'])" 2>/dev/null)
          v1_short_url=$(echo "$api_response" | python3 -c "import sys, json; print(json.load(sys.stdin)['short_url'])" 2>/dev/null)
          v1_long_url=$(echo "$api_response" | python3 -c "import sys, json; print(json.load(sys.stdin)['long_url'])" 2>/dev/null)
          v1_status=$(echo "$api_response" | python3 -c "import sys, json; print(json.load(sys.stdin)['status'])" 2>/dev/null)

          if [ -z "$v1_alias" ] || [ -z "$v1_short_url" ] || [ -z "$v1_long_url" ]; then
            echo "❌ V1 API response missing expected fields (alias, short_url, long_url)"
            exit 1
          fi
          echo "✅ V1 API shorten working: $v1_short_url (status: $v1_status)"

          # Save alias for stats test
          echo "V1_SHORT_CODE=$v1_alias" >> $GITHUB_ENV

          # Test redirect for V1-created URL
          echo "🔄 Testing redirect for V1 URL..."
          redirect_code=$(curl -s \
            --max-time 10 \
            --header 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' \
            --header 'X-Forwarded-For: 8.8.8.8' \
            --write-out "%{http_code}" \
            --output /dev/null \
            "$v1_short_url")

          if [ "$redirect_code" = "301" ] || [ "$redirect_code" = "302" ] || [ "$redirect_code" = "307" ]; then
            echo "✅ V1 redirect working (HTTP $redirect_code)"
          else
            echo "❌ Unexpected redirect response: $redirect_code"
            curl -s -I "$v1_short_url" | head -n 5
            exit 1
          fi

      - name: 'Test V1 API Stats (GET /api/v1/stats)'
        run: |
          echo "📊 Testing V1 API stats endpoint..."

          SERVICE_URL="${{ steps.spoo-setup.outputs.service-url }}"

          # Query anon stats for the V1 URL we created
          echo "📤 Fetching stats for: $V1_SHORT_CODE"
          stats_response=$(curl -s \
            --url "$SERVICE_URL/api/v1/stats?scope=anon&short_code=$V1_SHORT_CODE&group_by=time&metrics=clicks,unique_clicks" \
            --max-time 10)

          status_code=$(curl -s -o /dev/null -w "%{http_code}" \
            --url "$SERVICE_URL/api/v1/stats?scope=anon&short_code=$V1_SHORT_CODE" \
            --max-time 10)

          echo "📥 V1 Stats Response (HTTP $status_code):"
          echo "$stats_response" | python3 -m json.tool 2>/dev/null || echo "$stats_response"

          if [ "$status_code" != "200" ]; then
            echo "❌ V1 stats returned HTTP $status_code (expected 200)"
            exit 1
          fi
          echo "✅ V1 API stats working"

      - name: 'Test Service Logs'
        if: always()
        run: |
          echo "📄 Checking service logs..."
          cd test-spoo-service

          if [ -f "spoo-service.log" ]; then
            echo "✅ Service log file exists"
            echo "📊 Log file size: $(wc -l < spoo-service.log) lines"
            echo "📄 Last 20 lines of service logs:"
            tail -n 20 spoo-service.log
          else
            echo "❌ Service log file not found"
            ls -la
          fi

          if [ -f "spoo-service.pid" ]; then
            PID=$(cat spoo-service.pid)
            echo "📝 Service PID: $PID"
            if kill -0 $PID 2>/dev/null; then
              echo "✅ Service process is still running"
            else
              echo "⚠️ Service process is not running"
            fi
          else
            echo "❌ Service PID file not found"
          fi

      - name: 'Cleanup Test Resources'
        if: always()
        run: |
          echo "🧹 Cleaning up test resources..."

          # Stop the service
          cd test-spoo-service
          if [ -f "spoo-service.pid" ]; then
            PID=$(cat spoo-service.pid)
            if kill -0 $PID 2>/dev/null; then
              echo "🛑 Stopping service (PID: $PID)"
              kill $PID || true
              sleep 2

              # Force kill if still running
              if kill -0 $PID 2>/dev/null; then
                echo "🔥 Force stopping service"
                kill -9 $PID || true
              fi
            fi
          fi

          echo "✅ Cleanup completed"

  test-minimal:
    name: 'Test Minimal Configuration'
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4

      - name: 'Test with minimal config'
        uses: ./
        id: minimal-test

      - name: 'Verify minimal setup works'
        run: |
          echo "✅ Minimal setup test passed"
          echo "Service URL: ${{ steps.minimal-test.outputs.service-url }}"

          # Use health endpoint for verification
          health_response=$(curl -s ${{ steps.minimal-test.outputs.health-url }})
          echo "Health: $health_response"

          health_status=$(echo "$health_response" | python3 -c "import sys, json; print(json.load(sys.stdin)['status'])" 2>/dev/null)
          if [ "$health_status" = "healthy" ] || [ "$health_status" = "degraded" ]; then
            echo "✅ Service is running ($health_status)"
          elif [ -z "$health_status" ]; then
            echo "❌ Failed to parse health response"
            echo "📋 Raw response: $health_response"
            exit 1
          else
            echo "❌ Unexpected service status: $health_status"
            exit 1
          fi

  test-custom-timeout:
    name: 'Test Custom Timeout'
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4

      - name: 'Test with custom timeout'
        uses: ./
        id: timeout-test
        with:
          wait-timeout: '300'
          spoo-directory: 'custom-timeout-test'

      - name: 'Verify custom timeout works'
        run: |
          echo "✅ Custom timeout test passed"
          echo "Service URL: ${{ steps.timeout-test.outputs.service-url }}"

          health_response=$(curl -s ${{ steps.timeout-test.outputs.health-url }})
          health_status=$(echo "$health_response" | python3 -c "import sys, json; print(json.load(sys.stdin)['status'])" 2>/dev/null)
          if [ "$health_status" = "healthy" ] || [ "$health_status" = "degraded" ]; then
            echo "✅ Health: $health_status"
          elif [ -z "$health_status" ]; then
            echo "❌ Failed to parse health response"
            echo "📋 Raw response: $health_response"
            exit 1
          else
            echo "❌ Unexpected service status: $health_status"
            exit 1
          fi
